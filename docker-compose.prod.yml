services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: embedded-lab-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - mosquitto_data:/mosquitto/data

  influxdb:
    image: influxdb:2.7
    container_name: embedded-lab-influxdb
    restart: unless-stopped
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: adminadmin123
      DOCKER_INFLUXDB_INIT_ORG: embedded-lab
      DOCKER_INFLUXDB_INIT_BUCKET: telemetry
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: embedded-lab-token
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - influxdb_config:/etc/influxdb2

  grafana:
    image: grafana/grafana:11.1.0
    container_name: embedded-lab-grafana
    restart: unless-stopped
    depends_on:
      - influxdb
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: adminadmin123
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: embedded-lab-api:latest
    container_name: embedded-lab-api
    restart: unless-stopped
    depends_on:
      influxdb:
        condition: service_started
      mosquitto:
        condition: service_started
      mongodb:
        condition: service_healthy
    environment:
      MONGO_URI: mongodb://admin:admin@mongodb:27017
      MONGO_DATABASE: embedded_lab
      MONGO_USER_COLLECTION: users
      MONGO_TRANSACTION_COLLECTION: transactions
      MQTT_BROKER_URL: tcp://mosquitto:1883
      MQTT_TOPIC: esp32/temperature
      MQTT_INA219_TOPIC: esp32/ina219
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: embedded-lab-token
      INFLUXDB_ORG: embedded-lab
      INFLUXDB_BUCKET: telemetry
    ports:
      - "8080:8080"

  mongodb:
    image: mongo:7
    container_name: embedded-lab-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "mongodb://admin:admin@localhost:27017/admin", "--eval", "db.runCommand({ ping: 1 })"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mongo-express:
    image: mongo-express:1.0.2
    container_name: embedded-lab-mongo-express
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: admin
      ME_CONFIG_MONGODB_URL: mongodb://admin:admin@mongodb:27017/
      ME_CONFIG_BASICAUTH: "false"
    ports:
      - "8081:8081"

volumes:
  grafana_data:
  influxdb_config:
  influxdb_data:
  mosquitto_data:
  mongodb_data:
