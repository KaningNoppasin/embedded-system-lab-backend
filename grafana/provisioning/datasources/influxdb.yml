apiVersion: 1

datasources:
  - name: InfluxDB
    uid: influxdb
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    isDefault: true
    editable: true
    jsonData:
      version: Flux
      organization: embedded-lab
      defaultBucket: telemetry
      tlsSkipVerify: true
    secureJsonData:
      token: embedded-lab-token
